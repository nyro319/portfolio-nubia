<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll System | Junior Portfolio</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .loading-text:after { content: ' .'; animation: dots 1s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); } 40% { color: inherit; } 60% { text-shadow: .5em 0 0 inherit; } 80%, 100% { text-shadow: .5em 0 0 inherit, 1em 0 0 inherit; } }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen py-12 px-4">

    <div class="max-w-2xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Sistema de Gestión de Nóminas</h1>
            <p id="sistema-status" class="text-slate-500 mt-2 text-lg loading-text">Cargando motor de cálculo Python</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-sm font-bold text-blue-600 uppercase tracking-wider mb-6">Datos del Empleado</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-semibold text-slate-500 uppercase">Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="Ej. Alberto García" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-slate-500 uppercase">Puesto Laboral</label>
                        <input type="text" id="puesto" placeholder="Ej. Docente" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-slate-500 uppercase">Salario Bruto Mensual (€)</label>
                        <input type="number" id="nomina" placeholder="2400" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
                    </div>
                    <button id="btn-procesar" disabled onclick="procesarNomina()" class="w-full bg-slate-900 hover:bg-blue-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg hover:shadow-blue-200 active:scale-[0.98] disabled:opacity-50 disabled:cursor-wait">
                        Procesar Nómina
                    </button>
                </div>
            </div>

            <div id="resultado" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-center items-center text-center opacity-30 transition-opacity duration-500">
                <div id="placeholder-text">
                    <div class="bg-slate-100 p-4 rounded-full mb-4 inline-block">
                        <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <p class="text-slate-400 font-medium">Introduce datos para generar el desglose</p>
                </div>

                <div id="datos-salida" class="hidden w-full text-left">
                    <h2 class="text-sm font-bold text-green-600 uppercase tracking-wider mb-6 text-center">Desglose Calculado</h2>
                    <div class="space-y-3">
                        <div class="flex justify-between border-b border-slate-50 pb-2">
                            <span class="text-slate-500 italic text-sm" id="res-puesto"></span>
                            <span class="font-bold text-slate-900" id="res-nombre"></span>
                        </div>
                        <div class="flex justify-between pt-2">
                            <span class="text-slate-500 text-sm">Anual Bruto:</span>
                            <span class="font-semibold text-slate-700" id="res-anual"></span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-slate-500 text-sm">Retención IRPF:</span>
                            <span class="font-semibold text-red-500" id="res-irpf"></span>
                        </div>
                        <div class="mt-6 bg-blue-50 p-4 rounded-xl text-center">
                            <span class="block text-[10px] text-blue-600 font-bold uppercase tracking-widest mb-1">Salario Neto Anual</span>
                            <span class="text-3xl font-black text-blue-700" id="res-neto"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pyo;

        // Inicializar motor Python
        async function init() {
            try {
                pyo = await loadPyodide();
                document.getElementById('sistema-status').innerText = "Cálculo de retenciones IRPF basado en lógica Python OOP";
                document.getElementById('sistema-status').classList.remove('loading-text');
                document.getElementById('btn-procesar').disabled = false;
            } catch (e) {
                document.getElementById('sistema-status').innerText = "Error al cargar núcleo de cálculo";
            }
        }
        init();

        async function procesarNomina() {
            const nombre = document.getElementById('nombre').value;
            const puesto = document.getElementById('puesto').value || "Empleado";
            const nomina = document.getElementById('nomina').value;

            if(!nombre || !nomina) {
                alert("Por favor, rellena el nombre y el salario mensual.");
                return;
            }

            // Inyección de la lógica OOP original de main.py
            const pyCode = `
import json

class Empleado:
    def __init__(self, nombre, puesto, nomina):
        self.nombre = nombre
        self.puesto = puesto
        self.nomina = float(nomina)
        self.anualbruta = self.nomina * 12

    def calcular_irpf(self):
        if self.anualbruta > 30000:
            return self.anualbruta * 0.21
        else:
            return self.anualbruta * 0.15

    def calcular_neto(self, retencion):
        return self.anualbruta - retencion

def ejecutar_calculo(n, p, m):
    emp = Empleado(n, p, m)
    ret = emp.calcular_irpf()
    neto = emp.calcular_neto(ret)
    
    return json.dumps({
        "nombre": emp.nombre,
        "puesto": emp.puesto,
        "anual_bruta": emp.anualbruta,
        "irpf": ret,
        "neto_anual": neto
    })

ejecutar_calculo("${nombre}", "${puesto}", ${nomina})
            `;

            try {
                const out = await pyo.runPythonAsync(pyCode);
                const data = JSON.parse(out);

                // Actualizar Interfaz (Mantiene las funciones originales de tu index.html)
                document.getElementById('resultado').classList.remove('opacity-30');
                document.getElementById('placeholder-text').classList.add('hidden');
                document.getElementById('datos-salida').classList.remove('hidden');

                document.getElementById('res-nombre').innerText = data.nombre;
                document.getElementById('res-puesto').innerText = data.puesto;
                document.getElementById('res-anual').innerText = data.anual_bruta.toLocaleString('es-ES') + " €";
                document.getElementById('res-irpf').innerText = "-" + data.irpf.toLocaleString('es-ES') + " €";
                document.getElementById('res-neto').innerText = data.neto_anual.toLocaleString('es-ES') + " €";
                
            } catch (error) {
                console.error(error);
                alert("Fallo en el procesamiento de la nómina.");
            }
        }
    </script>
</body>
</html>
