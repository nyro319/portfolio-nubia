<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Tickets | Portfolio Dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .ticket-font { font-family: 'Courier Prime', monospace; }
        /* Efecto de borde de papel cortado */
        .ticket-edge {
            background-color: white;
            position: relative;
        }
        .ticket-edge::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(-135deg, white 5px, transparent 0), linear-gradient(135deg, white 5px, transparent 0);
            background-size: 10px 10px;
        }
    </style>
</head>
<body class="bg-slate-200 min-h-screen py-8 px-4">

    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
        
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-300">
            <h2 class="text-xl font-black text-slate-800 mb-6 uppercase tracking-tight">Punto de Venta (TPV)</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Seleccionar Producto</label>
                    <select id="producto" class="w-full mt-1 p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-blue-500 focus:bg-white outline-none transition-all cursor-pointer">
                        <option value="" disabled selected>-- Elegir artículo --</option>
                        <option value="Camiseta Algodón">Camiseta Algodón (15.00€)</option>
                        <option value="Pantalón Vaquero">Pantalón Vaquero (35.50€)</option>
                        <option value="Zapatillas Running">Zapatillas Running (59.99€)</option>
                        <option value="Gorra Sport">Gorra Sport (12.00€)</option>
                        <option value="Sudadera con Capucha">Sudadera con Capucha (25.00€)</option>
                    </select>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Cantidad</label>
                    <input type="number" id="cantidad" value="1" min="1" class="w-full mt-1 p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-blue-500 focus:bg-white outline-none">
                    <p class="text-[10px] text-slate-400 mt-2">* 5% de descuento por compras de 10 o más unidades.</p>
                </div>

                <button onclick="procesarTicket()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-200 active:scale-95">
                    GENERAR TICKET
                </button>
            </div>
        </div>

        <div id="ticket-container" class="hidden opacity-0 transition-all duration-700 transform translate-y-4">
            <div class="ticket-edge p-8 shadow-2xl ticket-font text-slate-800 border-t-8 border-slate-900">
                
                <div class="text-center border-b-2 border-dashed border-slate-300 pb-4 mb-4">
                    <h3 class="font-bold text-xl uppercase tracking-tighter">MARKET TECH S.A.</h3>
                    <p class="text-[10px] mt-1" id="res-fecha"></p>
                    <p class="text-[9px] text-slate-400">NIF: B-123456789</p>
                </div>

                <div class="space-y-3 text-sm">
                    <div class="flex justify-between font-bold border-b border-slate-100 pb-1">
                        <span>CONCEPTO</span>
                        <span>TOTAL</span>
                    </div>
                    
                    <div class="flex justify-between">
                        <span id="res-desc-prod" class="uppercase"></span>
                        <span id="res-subtotal-base"></span>
                    </div>
                    
                    <div class="text-[11px] text-slate-500 italic">
                        <span id="res-detalles"></span>
                    </div>
                </div>

                <div class="border-t-2 border-dashed border-slate-300 mt-6 pt-4 space-y-2 text-sm">
                    <div class="flex justify-between text-slate-600">
                        <span>DESCUENTO VOL.</span>
                        <span id="res-desc" class="text-red-500"></span>
                    </div>
                    <div class="flex justify-between">
                        <span>IVA (21%)</span>
                        <span id="res-iva"></span>
                    </div>
                </div>

                <div class="mt-8 border-t-4 border-double border-slate-900 pt-4 flex justify-between items-center">
                    <span class="text-lg font-bold">TOTAL NETO</span>
                    <span class="text-2xl font-black" id="res-total"></span>
                </div>

                <div class="mt-10 text-center text-[10px] space-y-4 uppercase">
                    <p>Atendido por: Sistema Automático</p>
                    <p class="font-bold tracking-[0.2em]">*** GRACIAS POR SU VISITA ***</p>
                    
                    <div class="flex justify-center h-10 w-full bg-slate-900 mt-4" style="clip-path: polygon(0 0, 3% 0, 3% 100%, 0 100%, 6% 0, 8% 0, 8% 100%, 6% 100%, 12% 0, 18% 0, 18% 100%, 12% 100%, 22% 0, 24% 0, 24% 100%, 22% 100%, 30% 0, 35% 0, 35% 100%, 30% 100%, 40% 0, 41% 0, 41% 100%, 40% 100%, 48% 0, 55% 0, 55% 100%, 48% 100%, 62% 0, 65% 0, 65% 100%, 62% 100%, 72% 0, 80% 0, 80% 100%, 72% 100%, 85% 0, 87% 0, 87% 100%, 85% 100%, 94% 0, 100% 0, 100% 100%, 94% 100%);"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        async function procesarTicket() {
            const prod = document.getElementById('producto').value;
            const cant = document.getElementById('cantidad').value;

            if(!prod) {
                alert("Por favor, selecciona un producto primero.");
                return;
            }

            try {
                // LLAMADA A TU API DE PYTHON
                const response = await fetch('http://127.0.0.1:8000/generar-ticket', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        producto: prod, 
                        cantidad: parseInt(cant) 
                    })
                });

                if (!response.ok) throw new Error("Error en la respuesta del servidor");

                const data = await response.json();

                // MAPEO DE DATOS AL HTML
                document.getElementById('res-fecha').innerText = data.fecha;
                document.getElementById('res-desc-prod').innerText = data.producto;
                document.getElementById('res-subtotal-base').innerText = data.subtotal.toFixed(2) + " €";
                document.getElementById('res-detalles').innerText = `CANTIDAD: ${data.cantidad} Unid. x ${data.precio_uni.toFixed(2)} €/u`;
                document.getElementById('res-desc').innerText = "-" + data.descuento.toFixed(2) + " €";
                document.getElementById('res-iva').innerText = data.iva.toFixed(2) + " €";
                document.getElementById('res-total').innerText = data.total.toFixed(2) + " €";

                // ANIMACIÓN DE ENTRADA
                const container = document.getElementById('ticket-container');
                container.classList.remove('hidden');
                // Un pequeño delay para que la transición CSS se note
                setTimeout(() => {
                    container.classList.remove('opacity-0', 'translate-y-4');
                    container.classList.add('opacity-100', 'translate-y-0');
                }, 50);

            } catch (e) {
                console.error(e);
                alert("ERROR: No se pudo conectar con el servidor Python (uvicorn).");
            }
        }
    </script>
</body>
</html>
