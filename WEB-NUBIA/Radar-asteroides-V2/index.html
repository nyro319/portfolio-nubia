<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE MONITOREO NEO v1.0 | Minimal Retro</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: #000000; /* Negro liso */
            color: #22c55e; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Estilo de fila para objetos peligrosos */
        .danger-row {
            background-color: rgba(220, 38, 38, 0.1); 
            color: #4ade80;
        }

        /* Palabra PELIGRO en rojo brillante */
        .status-danger {
            color: #ef4444 !important; 
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-safe {
            color: #166534; 
            font-weight: bold;
        }

        .retro-btn {
            background-color: transparent;
            border: 2px solid #22c55e;
            color: #22c55e;
            transition: all 0.2s ease;
        }
        
        .retro-btn:hover:not(:disabled) {
            background-color: #22c55e;
            color: #000000;
        }

        /* Encabezados de columna más grandes y legibles */
        th {
            font-size: 1.25rem; 
            font-weight: 700;
            color: #22c55e;
            border-bottom: 2px solid #166534;
            text-transform: uppercase;
        }

        input[type="date"] {
            color-scheme: dark;
            background-color: transparent;
            border: 1px solid #166534;
            color: #22c55e;
        }
    </style>
</head>
<body class="min-h-screen p-6 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start mb-10 border-b-2 border-green-900 pb-8 gap-6">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">NEO_TRACKER</h1>
                <p class="text-xs mt-1">BASE DE DATOS: NASA DEEP SPACE NETWORK</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4 items-center border border-green-900 p-3 bg-black">
                <label for="fecha-scan" class="text-xs uppercase">FECHA ANÁLISIS:</label>
                <input type="date" id="fecha-scan" class="px-3 py-1.5 text-sm outline-none focus:border-green-400 rounded-sm">
                <button id="btn-scan" disabled onclick="escanearEspacio()" class="retro-btn px-6 py-1.5 rounded-sm text-sm font-bold uppercase tracking-wider">
                    SCAN
                </button>
            </div>
        </header>

        <div id="status-box" class="text-xs text-green-700 mb-8 font-light italic">
            >>> SISTEMA INICIADO<br>
            <span id="python-status">>>> CARGANDO NÚCLEO...</span>
        </div>

        <div class="border border-green-900 bg-black p-2 overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr>
                        <th class="py-4 px-3 tracking-wider">OBJ_ID</th>
                        <th class="py-4 px-3 tracking-wider text-right">VELOCIDAD (KM/H)</th>
                        <th class="py-4 px-3 tracking-wider text-right">DIA_MÁX (M)</th>
                        <th class="py-4 px-3 tracking-wider text-right">ESTADO</th>
                    </tr>
                </thead>
                <tbody id="lista-asteroides" class="text-sm">
                    <tr>
                        <td colspan="4" class="py-24 text-center text-green-800">>>> NO HAY DATOS DISPONIBLES. EJECUTE UN ESCANEO.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let pyo;
        async function init() {
            try {
                pyo = await loadPyodide();
                document.getElementById('python-status').innerHTML = ">>> ESPERANDO ENTRADA DE FECHA Y COMANDO SCAN...";
                document.getElementById('btn-scan').disabled = false;
            } catch (e) {
                document.getElementById('python-status').innerHTML = ">>> ERROR AL INICIAR NÚCLEO.";
            }
        }
        init();

        document.getElementById('fecha-scan').valueAsDate = new Date();

        async function escanearEspacio() {
            const fecha = document.getElementById('fecha-scan').value;
            const status = document.getElementById('status-box');
            const tabla = document.getElementById('lista-asteroides');
            
            status.innerHTML = `>>> INICIANDO CONEXIÓN NASA API...<br>>>> RECUPERANDO DATOS T: ${fecha}...`;
            tabla.innerHTML = `<tr><td colspan="4" class="py-24 text-center text-green-700 animate-pulse">>>> RECUPERANDO DATOS...</td></tr>`;

            // Código Python mejorado con .get() para evitar el KeyError
            const pyCode = `
from pyodide.http import pyfetch
import json

async def fetch_data(d):
    url = f"https://api.nasa.gov/neo/rest/v1/feed?start_date={d}&end_date={d}&api_key=DEMO_KEY"
    resp = await pyfetch(url)
    js = await resp.json()
    
    # Validación: evita error si la clave no existe en la respuesta
    neo_data = js.get("near_earth_objects", {})
    day_list = neo_data.get(d, [])
    
    res = []
    for o in day_list:
        res.append({
            "n": o["name"],
            "v": float(o["close_approach_data"][0]["relative_velocity"]["kilometers_per_hour"]),
            "d": o["estimated_diameter"]["meters"]["estimated_diameter_max"],
            "p": o["is_potentially_hazardous_asteroid"]
        })
    return json.dumps(res)

await fetch_data("${fecha}")`;

            try {
                const out = await pyo.runPythonAsync(pyCode);
                const data = JSON.parse(out);
                
                if (data.length === 0) {
                    status.innerHTML = `>>> CONEXIÓN ESTABLECIDA.<br>>>> NO SE ENCONTRARON DATOS PARA LA FECHA ${fecha}.`;
                    tabla.innerHTML = `<tr><td colspan="4" class="py-24 text-center text-green-800">>>> CERO OBJETOS DETECTADOS EN ESTA FECHA.</td></tr>`;
                    return;
                }

                status.innerHTML = `>>> CONEXIÓN ESTABLECIDA.<br>>>> DATOS T ${fecha} RECUPERADOS.<br>>>> OBJETOS IDENTIFICADOS: ${data.length}.`;
                tabla.innerHTML = "";
                
                data.forEach(ast => {
                    const tr = document.createElement('tr');
                    tr.className = `border-b border-green-900/30 ${ast.p ? 'danger-row' : ''}`;
                    tr.innerHTML = `
                        <td class="py-4 px-3 font-bold ${ast.p ? 'text-white' : 'text-green-300'}">${ast.n}</td>
                        <td class="py-4 px-3 text-right">${Math.round(ast.v).toLocaleString('es-ES')}</td>
                        <td class="py-4 px-3 text-right">${ast.d.toFixed(1)}</td>
                        <td class="py-4 px-3 text-right font-bold uppercase">${ast.p ? '<span class="status-danger">PELIGRO</span>' : '<span class="status-safe">Seguro</span>'}</td>`;
                    tabla.appendChild(tr);
                });
            } catch (e) {
                status.innerHTML = `>>> ERROR CRÍTICO: ${e.message}`;
                tabla.innerHTML = `<tr><td colspan="4" class="py-24 text-center text-red-700">>>> FALLO EN EL PROCESAMIENTO DE DATOS.</td></tr>`;
            }
        }
    </script>
</body>
</html>
