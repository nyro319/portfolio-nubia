<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE MONITOREO NEO v1.0 | Pyodide Edition</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: #000000; 
            color: #22c55e; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .danger-row {
            background-color: rgba(220, 38, 38, 0.1); 
            color: #4ade80;
        }

        .status-danger {
            color: #ef4444 !important; 
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-safe {
            color: #166534; 
            font-weight: bold;
        }

        .retro-btn {
            background-color: transparent;
            border: 2px solid #22c55e;
            color: #22c55e;
            transition: all 0.2s ease;
        }
        .retro-btn:hover:not(:disabled) {
            background-color: #22c55e;
            color: #000000;
        }
        .retro-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        input[type="date"] {
            color-scheme: dark;
            background-color: transparent;
            border: 1px solid #166534;
            color: #22c55e;
        }

        /* Ajuste para que los encabezados de tabla sean legibles y grandes */
        th {
            font-size: 1.1rem; /* Un poco más grandes como pediste */
            color: #22c55e;
            border-bottom: 2px solid #166534;
        }
    </style>
</head>
<body class="min-h-screen p-6 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start mb-10 border-b-2 border-green-900 pb-8 gap-6">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">NEO_TRACKER</h1>
                <p class="text-xs mt-1">BASE DE DATOS: NASA DEEP SPACE NETWORK</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4 items-center border border-green-900 p-3 bg-black">
                <label for="fecha-scan" class="text-xs uppercase">FECHA ANÁLISIS:</label>
                <input type="date" id="fecha-scan" class="px-3 py-1.5 text-sm outline-none focus:border-green-400 rounded-sm">
                <button id="btn-scan" disabled onclick="escanearEspacio()" class="retro-btn px-6 py-1.5 rounded-sm text-sm font-bold uppercase tracking-wider">
                    SCAN
                </button>
            </div>
        </header>

        <div id="status-box" class="text-xs text-green-700 mb-8 font-light italic">
            >>> SISTEMA INICIADO<br>
            <span id="python-status">>>> CARGANDO NÚCLEO PYTHON (WASM)...</span>
        </div>

        <div class="border border-green-900 bg-black p-2 overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-green-700">
                        <th class="py-4 px-3 font-bold uppercase tracking-wider">OBJ_ID</th>
                        <th class="py-4 px-3 font-bold uppercase tracking-wider text-right">VELOCIDAD (KM/H)</th>
                        <th class="py-4 px-3 font-bold uppercase tracking-wider text-right">DIA_MÁX (M)</th>
                        <th class="py-4 px-3 font-bold uppercase tracking-wider text-right">ESTADO</th>
                    </tr>
                </thead>
                <tbody id="lista-asteroides" class="text-sm">
                    <tr>
                        <td colspan="4" class="py-24 text-center text-green-800">>>> NO HAY DATOS DISPONIBLES. EJECUTE UN ESCANEO.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let pyo;

        // 1. Inicializar Pyodide al cargar
        async function initPyodide() {
            const statusLabel = document.getElementById('python-status');
            const btn = document.getElementById('btn-scan');
            
            try {
                pyo = await loadPyodide();
                // Opcional: Cargar pandas si lo necesitas para cálculos complejos
                // await pyo.loadPackage("pandas"); 
                
                statusLabel.innerHTML = ">>> NÚCLEO ONLINE. ESPERANDO COMANDO SCAN...";
                btn.disabled = false;
            } catch (e) {
                statusLabel.innerHTML = ">>> ERROR AL INICIALIZAR NÚCLEO.";
            }
        }

        initPyodide();

        // 2. Establecer fecha de hoy
        document.getElementById('fecha-scan').valueAsDate = new Date();

        async function escanearEspacio() {
            const fecha = document.getElementById('fecha-scan').value;
            const status = document.getElementById('status-box');
            const tabla = document.getElementById('lista-asteroides');
            
            if(!fecha) return;

            status.innerHTML = `>>> INICIANDO CONEXIÓN NASA API...<br>>>> RECUPERANDO DATOS T: ${fecha}...`;
            tabla.innerHTML = `<tr><td colspan="4" class="py-24 text-center text-green-700 animate-pulse">>>> RECUPERANDO DATOS DEL ESPACIO PROFUNDO...</td></tr>`;

            // Lógica de Python dentro de JS usando Pyodide
            const pythonCode = `
from pyodide.http import pyfetch
import json

async def get_nasa_data(date_str):
    url = f"https://api.nasa.gov/neo/rest/v1/feed?start_date={date_str}&end_date={date_str}&api_key=DEMO_KEY"
    response = await pyfetch(url)
    data = await response.json()
    
    asteroids = data["near_earth_objects"][date_str]
    results = []
    
    for a in asteroids:
        results.append({
            "nombre": a["name"],
            "velocidad": float(a["close_approach_data"][0]["relative_velocity"]["kilometers_per_hour"]),
            "diametro": a["estimated_diameter"]["meters"]["estimated_diameter_max"],
            "peligro": a["is_potentially_hazardous_asteroid"]
        })
    return json.dumps(results)

await get_nasa_data("${fecha}")
            `;

            try {
                const resultJson = await pyo.runPythonAsync(pythonCode);
                const objetos = JSON.parse(resultJson);

                status.innerHTML = `>>> CONEXIÓN ESTABLECIDA.<br>>>> DATOS T ${fecha} RECUPERADOS.<br>>>> OBJETOS IDENTIFICADOS: ${objetos.length}.`;

                if(objetos.length === 0) {
                    tabla.innerHTML = `<tr><td colspan="4" class="py-24 text-center text-green-700">>>> NO SE DETECTARON NEOs --</td></tr>`;
                    return;
                }

                tabla.innerHTML = "";

                objetos.forEach(ast => {
                    const tr = document.createElement('tr');
                    tr.className = `border-b border-green-900/30 hover:bg-green-900/10 transition-colors ${ast.peligro ? 'danger-row' : ''}`;
                    
                    const veloc = Math.round(ast.velocidad).toLocaleString('es-ES');

                    tr.innerHTML = `
                        <td class="py-4 px-3 font-bold ${ast.peligro ? 'text-white' : 'text-green-300'}">${ast.nombre}</td>
                        <td class="py-4 px-3 text-right opacity-90">${veloc}</td>
                        <td class="py-4 px-3 text-right opacity-90">${ast.diametro.toFixed(1)}</td>
                        <td class="py-4 px-3 text-right font-bold uppercase">
                            ${ast.peligro ? 
                                '<span class="status-danger">PELIGRO</span>' : 
                                '<span class="status-safe">Seguro</span>'}
                        </td>
                    `;
                    tabla.appendChild(tr);
                });

            } catch (error) {
                status.innerHTML = `>>> ERROR CRÍTICO: ${error.message}`;
                tabla.innerHTML = `<tr><td colspan="4" class="py-24 text-center text-red-700 font-bold">>>> FALLO DE COMUNICACIÓN CON NASA_SERVER.</td></tr>`;
            }
        }
    </script>
</body>
</html>
