<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO_TRACKER - NASA DEEP SPACE NETWORK</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'VT323', monospace; 
            background-color: #000; 
            color: #1aff1a; 
            overflow-x: hidden;
        }

        /* Scanlines */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        .terminal-container { border: 1px solid #1aff1a44; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; color: #1aff1a; }
        th { text-align: left; border-bottom: 1px solid #1aff1a44; padding: 8px; color: #1aff1a99; font-size: 0.9rem; }
        td { padding: 12px 8px; border-bottom: 1px solid #1aff1a22; }
        
        .peligro { color: #ff3333; font-weight: bold; text-shadow: 0 0 8px #ff3333; }
        .seguro { color: #1aff1a; }

        /* Mejora del selector de fecha */
        input[type="date"] {
            background: #050505;
            border: 2px solid #1aff1a;
            color: #1aff1a;
            padding: 5px 12px;
            font-family: inherit;
            font-size: 1.2rem;
            cursor: pointer;
            outline: none;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(80%) sepia(50%) saturate(1000%) hue-rotate(80deg);
            cursor: pointer;
        }

        /* Botón SCAN más visible */
        #btn-scan {
            background: transparent;
            border: 3px solid #1aff1a;
            color: #1aff1a;
            padding: 5px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(26, 255, 26, 0.2);
            text-transform: uppercase;
        }

        #btn-scan:hover:not(:disabled) { 
            background: #1aff1a; 
            color: #000;
            box-shadow: 0 0 20px #1aff1a;
        }

        #btn-scan:active { transform: scale(0.95); }
        
        #btn-scan:disabled { 
            border-color: #053305;
            color: #053305;
            box-shadow: none;
        }
    </style>
</head>
<body class="p-8">

    <div class="max-w-5xl mx-auto relative z-10">
        <header class="flex flex-col md:flex-row justify-between items-end gap-6 mb-12">
            <div>
                <h1 class="text-5xl font-bold tracking-widest leading-none">NEO_TRACKER</h1>
                <p class="text-sm opacity-70 mt-1">BASE DE DATOS: NASA DEEP SPACE NETWORK</p>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex flex-col items-end">
                    <span class="text-xs mb-1 opacity-50">FECHA_ANÁLISIS</span>
                    <input type="date" id="fecha-input">
                </div>
                <button id="btn-scan" disabled>SCAN</button>
            </div>
        </header>

        <div id="logs" class="mb-8 text-lg space-y-1 h-24 overflow-hidden">
            <div class="opacity-50">>>> SISTEMA INICIADO</div>
            <div class="opacity-50" id="python-status">>>> CARGANDO NÚCLEO...</div>
        </div>

        <div class="terminal-container min-h-[400px] p-4 bg-[#050505]">
            <div id="output" class="w-full overflow-x-auto text-center py-24 opacity-40 text-2xl">
                >>> ESPERANDO ENTRADA DE FECHA Y COMANDO SCAN...
            </div>
        </div>
    </div>

    <script>
        async function init() {
            const output = document.getElementById("output");
            const logs = document.getElementById("logs");
            const btn = document.getElementById("btn-scan");
            const pythonStatus = document.getElementById("python-status");

            // Establecer fecha de hoy por defecto
            document.getElementById("fecha-input").valueAsDate = new Date();

            try {
                const pyodide = await loadPyodide();
                await pyodide.loadPackage("pandas");
                
                pythonStatus.innerText = ">>> SISTEMA_PYTHON: ONLINE";
                btn.disabled = false;

                const code = `
from pyodide.http import pyfetch
import pandas as pd

async def run_scan(fecha):
    url = f"https://api.nasa.gov/neo/rest/v1/feed?start_date={fecha}&api_key=DEMO_KEY"
    resp = await pyfetch(url)
    data = await resp.json()
    
    all_objs = []
    for f in data["near_earth_objects"]:
        for o in data["near_earth_objects"][f]:
            all_objs.append({
                "OBJ_ID": o["name"],
                "VELOCIDAD (KM/H)": f"{float(o['close_approach_data'][0]['relative_velocity']['kilometers_per_hour']):,.0f}",
                "DIA_MÁX (M)": f"{o['estimated_diameter']['meters']['estimated_diameter_max']:.1f}",
                "ESTADO": "PELIGRO" if o["is_potentially_hazardous_asteroid"] else "SEGURO"
            })
    
    df = pd.DataFrame(all_objs)
    html = df.to_html(index=False, border=0)
    html = html.replace("PELIGRO", "<span class='peligro'>PELIGRO</span>")
    html = html.replace("SEGURO", "<span class='seguro'>SEGURO</span>")
    return len(all_objs), html
                `;
                await pyodide.runPythonAsync(code);

                btn.onclick = async () => {
                    const fecha = document.getElementById("fecha-input").value;
                    if(!fecha) return;

                    output.innerHTML = "<div class='py-24 animate-pulse'>>>> RECUPERANDO DATOS DE TELEMETRÍA...</div>";
                    logs.innerHTML += `<div>>>> PETICIÓN NASA_API: ${fecha}</div>`;

                    const [count, tableHtml] = await pyodide.runPythonAsync(`await run_scan("${fecha}")`);
                    
                    logs.innerHTML += `<div class='text-green-400'>>>> ${count} OBJETOS IDENTIFICADOS. MOSTRANDO DATOS...</div>`;
                    output.innerHTML = tableHtml;
                    
                    // Auto-scroll logs
                    logs.scrollTop = logs.scrollHeight;
                };

            } catch (e) {
                pythonStatus.innerText = ">>> ERROR_CRÍTICO_NÚCLEO.";
            }
        }
        init();
    </script>
</body>
</html>
