<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO_TRACKER - NASA DEEP SPACE NETWORK</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'VT323', monospace; 
            background-color: #000; 
            color: #1aff1a; 
            overflow-x: hidden;
        }

        /* Líneas de escaneo de monitor antiguo */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        .terminal-container { border: 1px solid #1aff1a44; }
        
        /* Estilo de la tabla de Pandas igual al video */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; color: #1aff1a; }
        th { text-align: left; border-bottom: 1px solid #1aff1a44; padding: 8px; color: #1aff1a99; font-size: 0.9rem; }
        td { padding: 12px 8px; border-bottom: 1px solid #1aff1a22; }
        
        .peligro { color: #ff3333; font-weight: bold; text-shadow: 0 0 8px #ff3333; }
        .seguro { color: #1aff1a; }

        input[type="date"] {
            background: transparent;
            border: 1px solid #1aff1a;
            color: #1aff1a;
            padding: 2px 8px;
            font-family: inherit;
        }

        button {
            background: transparent;
            border: 1px solid #1aff1a;
            color: #1aff1a;
            padding: 2px 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) { background: #1aff1a; color: #000; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-5xl mx-auto relative z-10">
        <header class="flex justify-between items-start mb-12">
            <div>
                <h1 class="text-4xl font-bold tracking-widest">NEO_TRACKER</h1>
                <p class="text-sm opacity-70">BASE DE DATOS: NASA DEEP SPACE NETWORK</p>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-sm">FECHA ANÁLISIS:</span>
                <input type="date" id="fecha-input">
                <button id="btn-scan" disabled>SCAN</button>
            </div>
        </header>

        <div id="logs" class="mb-8 text-lg space-y-1">
            <div class="opacity-50">>>> SISTEMA INICIADO</div>
            <div class="opacity-50" id="python-status">>>> CARGANDO NÚCLEO...</div>
        </div>

        <div class="terminal-container min-h-[400px] p-4 bg-[#050505]">
            <div id="output" class="w-full overflow-x-auto text-center py-20 opacity-40">
                >>> NO HAY DATOS DISPONIBLES. EJECUTE UN ESCANEO.
            </div>
        </div>
    </div>

    <script>
        async function init() {
            const output = document.getElementById("output");
            const logs = document.getElementById("logs");
            const btn = document.getElementById("btn-scan");
            const pythonStatus = document.getElementById("python-status");

            try {
                const pyodide = await loadPyodide();
                await pyodide.loadPackage("pandas");
                
                pythonStatus.innerText = ">>> ESPERANDO ENTRADA DE FECHA Y COMANDO SCAN...";
                btn.disabled = false;

                const code = `
from pyodide.http import pyfetch
import pandas as pd
import json

async def run_scan(fecha):
    url = f"https://api.nasa.gov/neo/rest/v1/feed?start_date={fecha}&api_key=DEMO_KEY"
    resp = await pyfetch(url)
    data = await resp.json()
    
    all_objs = []
    for f in data["near_earth_objects"]:
        for o in data["near_earth_objects"][f]:
            all_objs.append({
                "OBJ_ID": o["name"],
                "VELOCIDAD (KM/H)": f"{float(o['close_approach_data'][0]['relative_velocity']['kilometers_per_hour']):,.0f}",
                "DIA_MÁX (M)": f"{o['estimated_diameter']['meters']['estimated_diameter_max']:.1f}",
                "ESTADO": "PELIGRO" if o["is_potentially_hazardous_asteroid"] else "SEGURO"
            })
    
    df = pd.DataFrame(all_objs)
    # Convertimos a HTML y aplicamos clases de color
    html = df.to_html(index=False, border=0)
    html = html.replace("PELIGRO", "<span class='peligro'>PELIGRO</span>")
    html = html.replace("SEGURO", "<span class='seguro'>SEGURO</span>")
    return len(all_objs), html
                `;
                await pyodide.runPythonAsync(code);

                btn.onclick = async () => {
                    const fecha = document.getElementById("fecha-input").value;
                    if(!fecha) return;

                    // Mensajes de log como en el video
                    output.innerHTML = "<div class='py-20 animate-pulse'>>>> RECUPERANDO DATOS...</div>";
                    logs.innerHTML += `<div>>>> INICIANDO CONEXIÓN NASA API...</div>`;
                    logs.innerHTML += `<div>>>> RECUPERANDO DATOS T: ${fecha}...</div>`;

                    const [count, tableHtml] = await pyodide.runPythonAsync(`await run_scan("${fecha}")`);
                    
                    logs.innerHTML += `<div class='text-green-400'>>>> CONEXIÓN ESTABLECIDA.</div>`;
                    logs.innerHTML += `<div class='text-green-400'>>>> DATOS T: ${fecha} RECUPERADOS.</div>`;
                    logs.innerHTML += `<div class='text-green-400'>>>> OBJETOS IDENTIFICADOS: ${count}.</div>`;
                    
                    output.innerHTML = tableHtml;
                };

            } catch (e) {
                pythonStatus.innerText = ">>> ERROR CRÍTICO EN NÚCLEO.";
            }
        }
        init();
    </script>
</body>
</html>
