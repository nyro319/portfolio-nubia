<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar NASA Real-Time | Nubia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Onest', sans-serif; }
        .console-box { background: rgba(244, 114, 182, 0.05); border: 1px solid rgba(244, 114, 182, 0.2); }
        .loader { border-top-color: #f472b6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="max-w-4xl mx-auto px-6 py-12">

    <header class="mb-10 text-center">
        <h1 class="text-3xl font-bold text-pink-300 mb-2">Radar de Asteroides NASA</h1>
        <p class="text-slate-400 italic">Datos en tiempo real via NeoWs (Near Earth Object Web Service)</p>
    </header>

    <main class="grid gap-8">
        <section class="console-box p-6 rounded-2xl">
            <div id="estado" class="text-sm text-yellow-400 mb-4 flex items-center gap-2">
                <div id="spinner" class="w-4 h-4 border-2 border-transparent loader rounded-full"></div>
                Cargando entorno Python y protocolos de red...
            </div>
            
            <button id="btnEjecutar" disabled 
                class="px-6 py-2 bg-pink-600 hover:bg-pink-500 disabled:bg-slate-700 rounded-full font-bold transition">
                Consultar API de la NASA
            </button>
        </section>

        <section id="resultados" class="console-box p-6 rounded-2xl min-h-[300px] font-mono text-sm overflow-auto">
            <div class="text-slate-500">> Sistema en espera...</div>
        </section>
    </main>

    <script>
        async function setupRadar() {
            const btn = document.getElementById("btnEjecutar");
            const estado = document.getElementById("estado");
            const output = document.getElementById("resultados");
            const spinner = document.getElementById("spinner");

            try {
                // 1. Inicializar Pyodide
                let pyodide = await loadPyodide();
                
                estado.innerHTML = "✓ Conexión establecida con el motor Python.";
                estado.classList.replace("text-yellow-400", "text-green-400");
                spinner.classList.add("hidden");
                btn.disabled = false;

                // 2. Lógica Python con acceso a Red (pyodide.http)
                const codigoPython = `
from pyodide.http import pyfetch
import json

async def obtener_datos_nasa():
    # URL de la API de la NASA (NeoWs) con una API KEY de demostración (DEMO_KEY)
    url = "https://api.nasa.gov/neo/rest/v1/feed/today?detailed=true&api_key=DEMO_KEY"
    
    try:
        response = await pyfetch(url)
        if response.status == 200:
            data = await response.json()
            
            # Procesamos los asteroides de hoy
            fecha_hoy = list(data['near_earth_objects'].keys())[0]
            asteroides = data['near_earth_objects'][fecha_hoy]
            
            resumen = f"REPORTE PARA LA FECHA: {fecha_hoy}\\n"
            resumen += "="*40 + "\\n"
            
            for ast in asteroides[:5]: # Mostramos los primeros 5
                nombre = ast['name']
                diametro = ast['estimated_diameter']['meters']['estimated_diameter_max']
                peligroso = "SÍ" if ast['is_potentially_hazardous_asteroid'] else "No"
                resumen += f"- {nombre}: Ø {diametro:.2f}m | Peligroso: {peligroso}\\n"
            
            return resumen
        else:
            return f"Error en la API: Status {response.status}"
    except Exception as e:
        return f"Error de conexión: {str(e)}"
                `;

                // Ejecutamos la definición
                await pyodide.runPythonAsync(codigoPython);

                btn.onclick = async () => {
                    output.innerHTML = '<div class="text-pink-400 italic">Contactando con los servidores de la NASA...</div>';
                    // Llamamos a la función asíncrona de Python
                    const resultado = await pyodide.runPythonAsync("obtener_datos_nasa()");
                    output.innerHTML = `<pre class="text-green-300">${resultado}</pre>`;
                };

            } catch (err) {
                estado.innerText = "Error crítico de sistema.";
                console.error(err);
            }
        }

        setupRadar();
    </script>
</body>
</html>
