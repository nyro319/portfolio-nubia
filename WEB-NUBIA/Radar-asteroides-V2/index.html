<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO_TRACKER - NASA DEEP SPACE NETWORK</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'VT323', monospace; 
            background-color: #050505; 
            color: #33ff33; 
            overflow-x: hidden;
        }

        .monitor-effect {
            position: relative;
            background: linear-gradient(180deg, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 4px 100%;
        }

        /* --- MEJORA DE LEGIBILIDAD EN ENCABEZADOS --- */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        
        th { 
            background-color: #33ff33; /* Fondo verde brillante */
            color: #000000;            /* Letras negras para máximo contraste */
            text-align: left; 
            padding: 15px 10px; 
            font-size: 1.4rem;        /* Más grande */
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid #33ff33;
        }

        td { 
            padding: 14px 10px; 
            border-bottom: 1px solid #1a551a; 
            color: #ffffff;           /* Datos en blanco puro para que resalten */
            font-size: 1.3rem;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
        }
        
        .peligro { color: #ff4444; font-weight: bold; text-shadow: 0 0 10px #ff0000; }
        .seguro { color: #33ff33; text-shadow: 0 0 5px #00ff00; }

        input[type="date"] {
            background: #111;
            border: 2px solid #33ff33;
            color: #33ff33;
            padding: 8px 15px;
            font-family: inherit;
            font-size: 1.4rem;
            cursor: pointer;
            border-radius: 4px;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            transform: scale(1.5);
            cursor: pointer;
        }

        #btn-scan {
            background: #004400;
            border: 3px solid #33ff33;
            color: #33ff33;
            padding: 10px 45px;
            font-size: 2.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(51, 255, 51, 0.3);
            text-transform: uppercase;
        }

        #btn-scan:hover:not(:disabled) { 
            background: #33ff33; 
            color: #000;
            box-shadow: 0 0 35px #33ff33;
        }

        #btn-scan:disabled { opacity: 0.2; cursor: not-allowed; }
    </style>
</head>
<body class="p-4 sm:p-10 monitor-effect">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-center gap-8 mb-12 border-b-4 border-green-900 pb-6">
            <div class="text-center lg:text-left">
                <h1 class="text-7xl font-bold tracking-tighter text-green-400" style="text-shadow: 0 0 20px #33ff33;">NEO_TRACKER</h1>
                <p class="text-xl opacity-80 mt-2">ACCESS_LEVEL: OVERRIDE | NASA_DEEP_SPACE_NETWORK</p>
            </div>
            
            <div class="flex flex-wrap justify-center items-center gap-8 bg-green-900/20 p-6 rounded-lg border border-green-800">
                <div class="flex flex-col items-center">
                    <span class="text-sm mb-2 font-bold uppercase tracking-widest">Temporal_Coord</span>
                    <input type="date" id="fecha-input">
                </div>
                <button id="btn-scan" disabled>SCAN</button>
            </div>
        </header>

        <div id="logs" class="mb-6 text-xl space-y-1 h-32 overflow-y-auto font-bold border-l-4 border-green-800 pl-4 bg-black/30">
            <div class="text-green-700">>>> KERNEL_LOAD_SUCCESS...</div>
            <div id="python-status" class="text-yellow-600">>>> LOADING_PANDAS_MODULES...</div>
        </div>

        <div class="border-2 border-green-900 p-2 rounded-lg bg-black/60">
            <div id="output" class="w-full overflow-x-auto min-h-[500px]">
                <div class="flex items-center justify-center h-[500px] text-3xl opacity-30 animate-pulse">
                    [ WAITING_FOR_OPERATOR_INPUT ]
                </div>
            </div>
        </div>
    </div>

    <script>
        async function init() {
            const output = document.getElementById("output");
            const logs = document.getElementById("logs");
            const btn = document.getElementById("btn-scan");
            const pythonStatus = document.getElementById("python-status");

            document.getElementById("fecha-input").valueAsDate = new Date();

            try {
                const pyodide = await loadPyodide();
                await pyodide.loadPackage("pandas");
                
                pythonStatus.innerText = ">>> SYSTEM_STATUS: ONLINE_AND_READY";
                pythonStatus.classList.replace("text-yellow-600", "text-green-500");
                btn.disabled = false;

                const code = `
from pyodide.http import pyfetch
import pandas as pd

async def run_scan(fecha):
    url = f"https://api.nasa.gov/neo/rest/v1/feed?start_date={fecha}&api_key=DEMO_KEY"
    resp = await pyfetch(url)
    data = await resp.json()
    
    all_objs = []
    for f in data["near_earth_objects"]:
        for o in data["near_earth_objects"][f]:
            all_objs.append({
                "ID_OBJETO": o["name"],
                "VELOCIDAD (KM/H)": f"{float(o['close_approach_data'][0]['relative_velocity']['kilometers_per_hour']):,.0f}",
                "DIAMETRO (M)": f"{o['estimated_diameter']['meters']['estimated_diameter_max']:.1f}",
                "ESTADO": "PELIGRO" if o["is_potentially_hazardous_asteroid"] else "SEGURO"
            })
    
    df = pd.DataFrame(all_objs)
    html = df.to_html(index=False, border=0)
    html = html.replace("PELIGRO", "<span class='peligro'>PELIGRO</span>")
    html = html.replace("SEGURO", "<span class='seguro'>SEGURO</span>")
    return len(all_objs), html
                `;
                await pyodide.runPythonAsync(code);

                btn.onclick = async () => {
                    const fecha = document.getElementById("fecha-input").value;
                    if(!fecha) return;

                    output.innerHTML = "<div class='flex items-center justify-center h-[500px] text-4xl text-green-400 animate-bounce'>UPLOADING_NASA_QUERY...</div>";
                    logs.innerHTML += `<div class="text-blue-500">>>> EXEC_SCAN: ${fecha}</div>`;

                    const [count, tableHtml] = await pyodide.runPythonAsync(`await run_scan("${fecha}")`);
                    
                    logs.innerHTML += `<div class='text-green-400'>>>> SCAN_COMPLETE: ${count} OBJS_FOUND.</div>`;
                    output.innerHTML = tableHtml;
                    logs.scrollTop = logs.scrollHeight;
                };

            } catch (e) {
                pythonStatus.innerText = ">>> CORE_DUMP_DETECTED.";
                pythonStatus.classList.replace("text-yellow-600", "text-red-600");
            }
        }
        init();
    </script>
</body>
</html>
