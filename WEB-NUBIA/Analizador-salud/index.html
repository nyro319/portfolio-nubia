<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthHub | Bio-Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f4f9ff; color: #1e293b; }
        .glass-card { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0, 100, 255, 0.04); }
        .input-field { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; transition: all 0.2s; }
        .input-field:focus { border-color: #3b82f6; background: white; outline: none; }
        /* Animación suave para los resultados */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-12 gap-6 h-full md:max-h-[600px]">
        
        <div class="md:col-span-4 glass-card p-6 flex flex-col justify-between border border-blue-50">
            <div>
                <h1 class="text-xl font-bold text-blue-600 mb-1">HealthHub</h1>
                <p class="text-xs text-slate-400 mb-6 uppercase tracking-widest font-bold">Panel de Control</p>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Peso (kg)</label>
                        <input type="number" id="peso" step="0.1" class="input-field w-full p-3 text-sm" placeholder="70">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Altura (m)</label>
                        <input type="number" id="altura" step="0.01" class="input-field w-full p-3 text-sm" placeholder="1.75">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Sueño (h)</label>
                        <input type="number" id="sueno" class="input-field w-full p-3 text-sm" placeholder="8">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Pasos Diarios</label>
                        <input type="number" id="pasos" class="input-field w-full p-3 text-sm" placeholder="8000">
                    </div>
                </div>
            </div>

            <button onclick="analizar()" class="bg-blue-600 text-white w-full py-4 rounded-xl font-bold text-sm hover:bg-blue-700 transition-all shadow-lg shadow-blue-100 mt-6">
                CALCULAR MÉTRICAS
            </button>
        </div>

        <div id="resultado-panel" class="md:col-span-8 grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="glass-card p-6 flex flex-col justify-center border-l-4 border-blue-500">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Índice Masa Corporal</span>
                <div id="imc-val" class="text-3xl font-bold my-1 text-slate-800">--</div>
                <p id="imc-msg" class="text-xs text-slate-500">Esperando datos...</p>
            </div>

            <div class="glass-card p-6 flex flex-col justify-center">
                <span class="text-[10px] font-bold text-slate-400 uppercase text-blue-400">Agua Diaria</span>
                <div id="agua-val" class="text-3xl font-bold my-1 text-slate-800">--</div>
                <p class="text-xs text-slate-500">Litros recomendados</p>
            </div>

            <div class="glass-card p-6 flex flex-col justify-center sm:col-span-2">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Actividad Física</span>
                <div id="act-msg" class="text-lg font-bold my-1 text-slate-800">No analizado</div>
                <div id="act-bar" class="w-full bg-slate-100 h-2 rounded-full mt-2 overflow-hidden">
                    <div id="act-progress" class="bg-blue-500 h-full transition-all" style="width: 0%"></div>
                </div>
            </div>

            <div class="glass-card p-6 flex flex-col justify-center sm:col-span-2">
                <div class="flex items-center gap-3">
                    <div id="sueno-icon" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-xl">🌙</div>
                    <div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Descanso</span>
                        <p id="sueno-msg" class="text-sm font-medium text-slate-700 italic">Analiza tu rutina de sueño</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function analizar() {
            const payload = {
                peso: parseFloat(document.getElementById('peso').value),
                altura: parseFloat(document.getElementById('altura').value),
                horas_sueno: parseFloat(document.getElementById('sueno').value),
                pasos_diarios: parseInt(document.getElementById('pasos').value)
            };

            if (Object.values(payload).some(v => !v)) return alert("Completa todos los campos");

            try {
                const response = await fetch('http://127.0.0.1:8000/analizar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const d = await response.json();

                // Actualizar Interfaz
                document.getElementById('imc-val').innerText = d.imc;
                document.getElementById('imc-msg').innerText = d.imc_status === 'normal' ? "Rango saludable" : "Fuera de rango ideal";
                
                document.getElementById('agua-val').innerText = d.agua_recomendada + "L";
                
                document.getElementById('act-msg').innerText = d.actividad_msg;
                const progress = payload.pasos_diarios > 10000 ? 100 : (payload.pasos_diarios / 10000) * 100;
                document.getElementById('act-progress').style.width = progress + "%";
                document.getElementById('act-progress').className = `h-full transition-all ${d.actividad_status === 'safe' ? 'bg-green-500' : 'bg-blue-500'}`;

                document.getElementById('sueno-msg').innerText = d.sueno_msg;
                document.getElementById('sueno-icon').className = `w-10 h-10 rounded-full flex items-center justify-center text-xl ${d.sueno_status === 'safe' ? 'bg-green-100' : 'bg-amber-100'}`;
                
                document.getElementById('resultado-panel').classList.add('fade-in');
                setTimeout(() => document.getElementById('resultado-panel').classList.remove('fade-in'), 500);

            } catch (e) { alert("Error de conexión"); }
        }
    </script>
</body>
</html>
